<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Workshido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-900: #042C53; --blue-800: #0C447C; --blue-600: #185FA5;
    --blue-200: #85B7EB; --blue-100: #B5D4F4; --teal-400: #1D9E75;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-50: #F1EFE8; --white: #ffffff;
    --radius-sm: 6px; --font-display: 'Sora', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  nav { background: var(--blue-900); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 60px; }
  .nav-logo { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--blue-200); }
  .wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
  .code { font-family: var(--font-display); font-size: 96px; font-weight: 700; color: var(--blue-200); line-height: 1; margin-bottom: 16px; }
  h1 { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--gray-900); margin-bottom: 12px; }
  p { font-size: 15px; color: var(--gray-600); max-width: 380px; line-height: 1.7; margin-bottom: 32px; }
  .btn { display: inline-block; background: var(--blue-600); color: var(--white); text-decoration: none; border-radius: var(--radius-sm); padding: 12px 28px; font-family: var(--font-body); font-size: 14px; font-weight: 600; transition: background 0.15s; }
  .btn:hover { background: var(--blue-800); }
  .btn-ghost { display: inline-block; color: var(--blue-600); text-decoration: none; font-size: 14px; font-weight: 500; margin-left: 16px; }
</style>
</head>
<body>
<nav>
  <a href="workshido-index.html" class="nav-logo">work<span>shido</span></a>
</nav>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to the worksheets.</p>
  <div>
    <a href="workshido-index.html" class="btn">Browse worksheets →</a>
    <a href="javascript:history.back()" class="btn-ghost">← Go back</a>
  </div>
</div>
</body>
</html>
