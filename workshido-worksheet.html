<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-900: #042C53; --blue-800: #0C447C; --blue-600: #185FA5;
    --blue-400: #378ADD; --blue-200: #85B7EB; --blue-100: #B5D4F4; --blue-50: #E6F1FB;
    --teal-600: #0F6E56; --teal-400: #1D9E75; --teal-100: #9FE1CB; --teal-50: #E1F5EE;
    --amber-600: #854F0B; --amber-50: #FAEEDA;
    --purple-600: #534AB7; --purple-50: #EEEDFE;
    --coral-600: #993C1D; --coral-50: #FAECE7;
    --green-600: #3B6D11; --green-50: #EAF3DE;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-300: #B4B2A9; --gray-100: #D3D1C7; --gray-50: #F1EFE8;
    --white: #ffffff;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
    --font-display: 'Sora', sans-serif; --font-body: 'Inter', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--gray-50); color: var(--gray-900); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: var(--blue-900); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 60px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .nav-logo { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: -0.5px; }
  .nav-logo span { color: var(--blue-200); }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--blue-100); text-decoration: none; font-weight: 500; transition: color 0.15s; }
  .nav-links a:hover { color: var(--white); }
  .nav-actions { display: flex; gap: 10px; align-items: center; }
  .btn-ghost { font-size: 13px; font-weight: 500; color: var(--blue-100); background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 7px 16px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .btn-ghost:hover { border-color: var(--blue-200); color: var(--white); }
  .btn-primary-nav { font-size: 13px; font-weight: 600; color: var(--blue-900); background: var(--white); border: none; border-radius: var(--radius-sm); padding: 7px 18px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .btn-primary-nav:hover { background: var(--blue-50); }

  /* BREADCRUMB */
  .breadcrumb { padding: 16px 32px; font-size: 13px; color: var(--gray-300); max-width: 1100px; margin: 0 auto; }
  .breadcrumb a { color: var(--gray-600); text-decoration: none; }
  .breadcrumb a:hover { color: var(--blue-600); }
  .breadcrumb span { margin: 0 6px; }

  /* MAIN */
  .page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 32px 64px; display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }

  /* PREVIEW */
  .preview-box { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-100); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 480px; }
  .preview-box img { width: 100%; height: auto; display: block; }
  .preview-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px; color: var(--gray-300); font-size: 14px; }

  /* SIDEBAR */
  .detail-sidebar { display: flex; flex-direction: column; gap: 20px; }
  .detail-card { background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius-lg); padding: 24px; }

  .ws-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--gray-900); line-height: 1.3; margin-bottom: 14px; }

  .ws-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge-level { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-level.a1 { background: var(--teal-50);   color: var(--teal-600); }
  .badge-level.a2 { background: var(--blue-50);   color: var(--blue-600); }
  .badge-level.b1 { background: var(--amber-50);  color: var(--amber-600); }
  .badge-level.b2 { background: var(--purple-50); color: var(--purple-600); }
  .badge-level.c1 { background: var(--coral-50);  color: var(--coral-600); }
  .badge-cat { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: var(--gray-50); color: var(--gray-600); border: 1px solid var(--gray-100); }
  .badge-free { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--teal-50); color: var(--teal-600); }
  .badge-premium { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--amber-50); color: var(--amber-600); }

  .ws-desc { font-size: 14px; color: var(--gray-600); line-height: 1.65; margin-bottom: 16px; }

  .ws-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tag { font-size: 12px; color: var(--blue-600); background: var(--blue-50); border-radius: 20px; padding: 3px 10px; }

  .ws-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; padding-top: 16px; border-top: 1px solid var(--gray-100); }
  .ws-meta-row { display: flex; justify-content: space-between; font-size: 13px; }
  .ws-meta-label { color: var(--gray-300); }
  .ws-meta-value { color: var(--gray-900); font-weight: 500; }

  .btn-download-big { width: 100%; padding: 14px; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 15px; font-weight: 600; background: var(--blue-600); color: var(--white); border: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
  .btn-download-big:hover { background: var(--blue-800); transform: translateY(-1px); }
  .btn-download-big.locked { background: var(--gray-100); color: var(--gray-300); cursor: not-allowed; }
  .btn-download-big.locked:hover { transform: none; background: var(--gray-100); }

  .loading { grid-column: 1 / -1; text-align: center; padding: 80px 0; color: var(--gray-300); font-size: 14px; }

  @media (max-width: 768px) {
    .page-wrap { grid-template-columns: 1fr; padding: 0 16px 48px; }
    .breadcrumb { padding: 16px; }
    nav { padding: 0 16px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="workshido-index.html" class="nav-logo">work<span>shido</span></a>
  <ul class="nav-links">
    <li><a href="workshido-index.html">Browse</a></li>
    <li><a href="workshido-index.html?cat=Grammar">Grammar</a></li>
    <li><a href="workshido-index.html?cat=Vocabulary">Vocabulary</a></li>
    <li><a href="workshido-index.html?cat=Skills">Skills</a></li>
    <li><a href="workshido-forteachers.html">For teachers</a></li>
    <li><a href="workshido-upload.html" style="color:var(--teal-100);">⬆ Upload</a></li>
  </ul>
  <div class="nav-actions" id="navActions">
    <a href="workshido-login.html" class="btn-ghost">Log in</a>
    <a href="workshido-signup.html" class="btn-primary-nav">Sign up free</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="workshido-index.html">Browse</a>
  <span>›</span>
  <span id="bcCategory">—</span>
  <span>›</span>
  <span id="bcTitle">Loading...</span>
</div>

<div class="page-wrap" id="pageWrap">
  <div class="loading">Loading worksheet...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient('https://mhbgxdsdaalvtgobnvbh.supabase.co','sb_publishable_SnvJUMzhWFsSBHJZyCAjTA_nH0-F9jo');
const LEVEL_CLASS = { A1:'a1', A2:'a2', B1:'b1', B2:'b2', C1:'c1' };
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  const nav = document.getElementById('navActions');
  if (user && nav) {
    const name = user.user_metadata?.full_name || user.email;
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
    nav.innerHTML = `<a href="workshido-profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#B5D4F4;font-size:13px;font-weight:500;"><div style="width:32px;height:32px;border-radius:50%;background:#E6F1FB;color:#185FA5;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:2px solid #85B7EB;">${initials}</div>${name.split(' ')[0]}</a><button onclick="logOut()" style="background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:7px 14px;color:#B5D4F4;font-size:13px;cursor:pointer;font-family:inherit;">Log out</button>`;
  }
}
async function logOut() { await sb.auth.signOut(); window.location.reload(); }

async function loadWorksheet() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { renderError('No worksheet ID provided.'); return; }

  const { data, error } = await sb.from('worksheets').select('*').eq('id', id).single();
  if (error || !data) { renderError('Worksheet not found.'); return; }

  document.title = `${esc(data.title)} — Workshido`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${data.title} — Workshido`);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', data.description || `${data.level} ${data.category} worksheet. Free download.`);
  if (data.thumbnail_url) document.querySelector('meta[property="og:image"]')?.setAttribute('content', data.thumbnail_url);
  const wsUrl = `https://workshido.com/workshido-worksheet.html?id=${data.id}`;
  document.querySelector('link[rel="canonical"]')?.setAttribute('href', wsUrl);
  document.querySelector('meta[property="og:url"]')?.setAttribute('content', wsUrl);
  const schema = document.getElementById('schemaLD');
  if (schema) schema.textContent = JSON.stringify({ "@context":"https://schema.org","@type":"LearningResource","name":data.title,"description":data.description||"","educationalLevel":data.level,"learningResourceType":"Worksheet","inLanguage":"en","isAccessibleForFree":data.is_free,"provider":{"@type":"Organization","name":"Workshido","url":"https://workshido.com"} });
  document.getElementById('bcCategory').textContent = data.category || 'Worksheet';
  document.getElementById('bcTitle').textContent = data.title;

  const lvlCls = LEVEL_CLASS[data.level] || 'a1';
  const tags = (data.tags || '').split(',').filter(t => t.trim()).map(t => `<span class="tag">${esc(t.trim())}</span>`).join('');
  const freeBadge = data.is_free ? '<span class="badge-free">Free</span>' : '<span class="badge-premium">⭐ Premium</span>';
  const desc = data.description ? `<p class="ws-desc">${esc(data.description)}</p>` : '';
  const ext = (data.file_url || '').split('.').pop().split('?')[0].toUpperCase();

  const preview = data.thumbnail_url
    ? `<img src="${data.thumbnail_url}" alt="${data.title}">`
    : `<div class="preview-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>No preview available</span>
      </div>`;

  const downloadBtn = data.is_free
    ? `<button class="btn-download-big" onclick="downloadWS('${data.file_url}','${data.id}',${data.downloads||0})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download free
      </button>`
    : `<button class="btn-download-big locked">🔒 Premium — unlock to download</button>`;

  document.getElementById('pageWrap').innerHTML = `
    <div class="preview-box">${preview}</div>
    <div class="detail-sidebar">
      <div class="detail-card">
        <div class="ws-title">${esc(data.title)}</div>
        <div class="ws-badges">
          <span class="badge-level ${lvlCls}">${data.level}</span>
          ${data.category ? `<span class="badge-cat">${data.category}</span>` : ''}
          ${freeBadge}
        </div>
        ${desc}
        ${tags ? `<div class="ws-tags">${tags}</div>` : ''}
        <div class="ws-meta">
          <div class="ws-meta-row"><span class="ws-meta-label">Format</span><span class="ws-meta-value">${ext || '—'}</span></div>
          <div class="ws-meta-row"><span class="ws-meta-label">Level</span><span class="ws-meta-value">${data.level || '—'}</span></div>
          <div class="ws-meta-row"><span class="ws-meta-label">Downloads</span><span class="ws-meta-value" id="dlCount">${data.downloads || 0}</span></div>
        </div>
        ${downloadBtn}
        ${data.is_free ? `<button class="btn-print" onclick="window.open('${data.file_url}','_blank')" style="width:100%;padding:10px;margin-top:8px;background:transparent;border:1.5px solid var(--blue-200);border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;color:var(--blue-600);cursor:pointer;transition:all 0.15s;" onmouseover="this.style.background='var(--blue-50)'" onmouseout="this.style.background='transparent'">🖨️ Print / Open PDF</button>` : ''}
      </div>
    </div>`;
}

async function downloadWS(url, id, currentDl) {
  window.open(url, '_blank');
  const newCount = currentDl + 1;
  const el = document.getElementById('dlCount');
  if (el) el.textContent = newCount;
  await sb.from('worksheets').update({ downloads: newCount }).eq('id', id);
}

function renderError(msg) {
  document.getElementById('pageWrap').innerHTML = `<div class="loading">${msg} <a href="workshido-index.html" style="color:var(--blue-600)">← Back to catalog</a></div>`;
}

document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadWorksheet(); });
</script>
</body>
</html>
